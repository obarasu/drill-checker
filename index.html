<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ドリルチェッカー">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<title>ドリルチェッカー</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --blue: #2563eb;
  --green: #16a34a;
  --red: #dc2626;
  --grey: #9ca3af;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-sub: #64748b;
  --correct-blue: #2563eb;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-text-size-adjust: 100%;
  min-height: 100dvh;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* Header */
.header {
  background: var(--card);
  text-align: center;
  padding: 8px 16px;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
  z-index: 10;
}

.header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
}

/* Main content area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Welcome state */
.welcome {
  text-align: center;
  padding: 40px 20px;
}

.welcome h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.welcome p {
  font-size: 14px;
  color: var(--text-sub);
  line-height: 1.6;
}

/* Scanning overlay */
.scan-overlay {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 5;
  background: rgba(0,0,0,0.5);
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.scan-overlay.active {
  display: flex;
}

.scan-line {
  position: absolute;
  left: 5%;
  right: 5%;
  height: 3px;
  background: var(--blue);
  box-shadow: 0 0 12px rgba(37, 99, 235, 0.6);
  animation: scanDown 1.5s ease-in-out;
  top: 0;
}

@keyframes scanDown {
  0%   { top: 5%; opacity: 1; }
  100% { top: 90%; opacity: 0.3; }
}

.scan-label {
  font-size: 16px;
  font-weight: 600;
  color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Photo viewer with markers */
.photo-view {
  display: none;
  position: relative;
  width: 100%;
  height: 100%;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.photo-view.active {
  display: block;
}

.photo-container {
  position: relative;
  width: 100%;
  min-height: 100%;
}

.photo-container img,
.photo-container canvas {
  display: block;
  width: 100%;
  height: auto;
}

/* Marker overlay */
.marker {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: auto;
  z-index: 2;
  animation: markerPop 0.3s ease-out both;
}

@keyframes markerPop {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  70% { transform: translate(-50%, -50%) scale(1.15); }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

.marker-circle {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
}

.marker-correct .marker-circle {
  color: var(--green);
  text-shadow: 0 0 8px rgba(22, 163, 74, 0.4);
}

/* Draw a circle (maru) for correct */
.marker-correct .marker-circle::before {
  content: '';
  position: absolute;
  width: 40px;
  height: 40px;
  border: 4px solid var(--green);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(22, 163, 74, 0.3);
}

.marker-wrong .marker-circle {
  color: var(--red);
  font-size: 32px;
  text-shadow: 0 0 8px rgba(220, 38, 38, 0.4);
}

/* Correction badge */
.correction-badge {
  position: absolute;
  top: -8px;
  left: 36px;
  background: var(--correct-blue);
  color: white;
  font-size: 14px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(37, 99, 235, 0.4);
}

/* Legend bar */
.legend-bar {
  display: none;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  z-index: 3;
  border-top: 1px solid #e2e8f0;
}

.legend-bar.active {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.legend-correct { color: var(--green); }
.legend-wrong { color: var(--red); }
.legend-total { color: var(--text-sub); }

/* Bottom bar */
.bottom-bar {
  flex-shrink: 0;
  background: var(--card);
  border-top: 1px solid #e2e8f0;
  display: flex;
  gap: 8px;
  padding: 10px 16px calc(10px + var(--safe-bottom));
  z-index: 10;
  justify-content: center;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 44px;
  padding: 0 18px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, opacity 0.1s;
  flex: 1;
  max-width: 140px;
}

.btn:active {
  transform: scale(0.97);
  opacity: 0.9;
}

.btn-icon {
  font-size: 18px;
}

.btn-camera {
  background: var(--blue);
  color: white;
}

.btn-demo {
  background: #f1f5f9;
  color: var(--text);
}

.btn-reset {
  background: #f1f5f9;
  color: var(--text-sub);
}

/* Hidden file input */
#cameraInput {
  display: none;
}
</style>
</head>
<body>

<header class="header">
  <h1>ドリルチェッカー</h1>
</header>

<main class="main" id="mainArea">
  <!-- Welcome state -->
  <div class="welcome" id="welcomeView">
    <h2>ドリルをチェックしよう</h2>
    <p>カメラでプリントを撮影するか、<br>デモモードで動作を確認できます。</p>
  </div>

  <!-- Photo view with overlay markers -->
  <div class="photo-view" id="photoView">
    <div class="photo-container" id="photoContainer"></div>
    <div class="legend-bar" id="legendBar">
      <span class="legend-item legend-total" id="legendTotal"></span>
      <span class="legend-item legend-wrong" id="legendWrong"></span>
    </div>
  </div>

  <!-- Scanning overlay -->
  <div class="scan-overlay" id="scanView">
    <div class="scan-line"></div>
    <span class="scan-label">チェック中...</span>
  </div>
</main>

<!-- Bottom sticky bar -->
<nav class="bottom-bar">
  <button class="btn btn-camera" id="btnCamera">
    <span class="btn-icon">📷</span>カメラ
  </button>
  <button class="btn btn-demo" id="btnDemo">
    <span class="btn-icon">▶</span>デモ
  </button>
  <button class="btn btn-reset" id="btnReset">
    <span class="btn-icon">↩</span>リセット
  </button>
</nav>

<!-- Camera live view (getUserMedia) -->
<div id="cameraView" style="display:none;position:fixed;inset:0;z-index:100;background:#000;flex-direction:column;align-items:center;justify-content:center;">
  <video id="cameraVideo" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
  <div style="position:absolute;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:0;right:0;display:flex;justify-content:center;gap:24px;align-items:center;">
    <button onclick="App.closeCamera()" style="background:rgba(255,255,255,0.2);border:2px solid white;color:white;border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;">✕</button>
    <button id="btnShutter" onclick="App.capturePhoto()" style="background:white;border:4px solid rgba(255,255,255,0.6);border-radius:50%;width:72px;height:72px;cursor:pointer;box-shadow:0 0 0 3px rgba(0,0,0,0.3);"></button>
  </div>
</div>

<script>
// ============================================================
// OCR Module (stub)
// ============================================================
const OcrModule = (() => {
  async function analyzeWorksheetImage(imageData) {
    // TODO: Replace with real OCR (GPT-4o Vision API)
    return {
      problems: [
        { number: 9,  operand1: 765, operator: '-', operand2: 381, studentAnswer: 384 },
        { number: 10, operand1: 765, operator: '-', operand2: 549, studentAnswer: 216 },
        { number: 11, operand1: 924, operator: '-', operand2: 316, studentAnswer: 608 },
        { number: 12, operand1: 924, operator: '-', operand2: 444, studentAnswer: 480 },
        { number: 13, operand1: 438, operator: '-', operand2: 394, studentAnswer: 44 },
        { number: 14, operand1: 438, operator: '-', operand2: 409, studentAnswer: 21 },  // wrong: correct=29
        { number: 15, operand1: 809, operator: '-', operand2: 725, studentAnswer: 84 },
        { number: 16, operand1: 391, operator: '-', operand2: 178, studentAnswer: 213 },
      ]
    };
  }

  return { analyzeWorksheetImage };
})();


// ============================================================
// Solver Module
// ============================================================
const Solver = (() => {
  const operations = {
    '+': (a, b) => a + b,
    '-': (a, b) => a - b,
  };

  function gradeProblems(problems) {
    return problems.map(p => {
      const correctAnswer = operations[p.operator](p.operand1, p.operand2);
      return { ...p, correctAnswer, isCorrect: p.studentAnswer === correctAnswer };
    });
  }

  return { gradeProblems };
})();


// ============================================================
// Worksheet Generator (draws a realistic-looking drill sheet)
// ============================================================
const WorksheetGen = (() => {
  function draw(problems, containerWidth) {
    const dpr = window.devicePixelRatio || 1;
    // Worksheet aspect: portrait A4-ish
    const w = containerWidth;
    const h = Math.round(w * 1.35);
    const canvas = document.createElement('canvas');
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Background: slightly off-white with subtle grid
    ctx.fillStyle = '#faf9f6';
    ctx.fillRect(0, 0, w, h);

    // Faint grid lines
    ctx.strokeStyle = '#e8e6e0';
    ctx.lineWidth = 0.5;
    const gridSize = 20;
    for (let x = 0; x < w; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 0; y < h; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Title area
    ctx.fillStyle = '#333';
    ctx.font = `bold ${Math.round(w * 0.045)}px 'Hiragino Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('ひきざん (3けた)', w / 2, h * 0.055);

    ctx.font = `${Math.round(w * 0.03)}px 'Hiragino Sans', sans-serif`;
    ctx.fillStyle = '#888';
    ctx.fillText('名前：＿＿＿＿＿＿', w * 0.78, h * 0.055);

    // Divider line
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w * 0.05, h * 0.08);
    ctx.lineTo(w * 0.95, h * 0.08);
    ctx.stroke();

    // 2 columns, 4 rows
    const cols = 2;
    const rows = 4;
    const colW = w * 0.42;
    const startX = [w * 0.07, w * 0.54];
    const startY = h * 0.12;
    const rowH = h * 0.19;

    // Marker positions as % of canvas (for overlay)
    const markerPositions = [];

    ctx.textAlign = 'left';

    problems.forEach((p, i) => {
      const col = i < rows ? 0 : 1;
      const row = i < rows ? i : i - rows;
      const x = startX[col];
      const y = startY + row * rowH;

      const numFont = Math.round(w * 0.034);
      const probFont = Math.round(w * 0.055);
      const ansFont = Math.round(w * 0.055);

      // Problem number label
      ctx.fillStyle = '#666';
      ctx.font = `${numFont}px 'Hiragino Sans', sans-serif`;
      ctx.fillText(`(${p.number})`, x, y + probFont * 0.3);

      // Operand 1 (right-aligned in a box area)
      const boxX = x + w * 0.06;
      const digitW = w * 0.035;

      ctx.fillStyle = '#222';
      ctx.font = `${probFont}px 'Hiragino Sans', sans-serif`;
      ctx.textAlign = 'right';

      const op1Str = String(p.operand1);
      ctx.fillText(op1Str, boxX + digitW * 4.5, y + probFont * 0.3);

      // Operator + operand 2
      ctx.textAlign = 'left';
      ctx.fillText('−', boxX + digitW * 0.2, y + probFont * 1.5);
      ctx.textAlign = 'right';
      ctx.fillText(String(p.operand2), boxX + digitW * 4.5, y + probFont * 1.5);

      // Answer line
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(boxX + digitW * 0.2, y + probFont * 1.85);
      ctx.lineTo(boxX + digitW * 5, y + probFont * 1.85);
      ctx.stroke();

      // Student's "handwritten" answer (slightly offset, blue-ish pencil)
      ctx.fillStyle = '#3355aa';
      ctx.font = `italic ${ansFont}px 'Hiragino Sans', sans-serif`;
      ctx.textAlign = 'right';
      const ansY = y + probFont * 2.75;
      ctx.fillText(String(p.studentAnswer), boxX + digitW * 4.5 + 2, ansY);

      // Record marker position as % of canvas size
      // Position marker to the right of the answer
      const markerXpct = ((boxX + digitW * 5.8) / w) * 100;
      const markerYpct = ((ansY - probFont * 0.3) / h) * 100;
      markerPositions.push({ x: markerXpct, y: markerYpct });

      ctx.textAlign = 'left';
    });

    return { canvas, markerPositions, width: w, height: h };
  }

  return { draw };
})();


// ============================================================
// UI Controller
// ============================================================
const App = (() => {
  const welcomeView = document.getElementById('welcomeView');
  const photoView = document.getElementById('photoView');
  const photoContainer = document.getElementById('photoContainer');
  const scanView = document.getElementById('scanView');
  const legendBar = document.getElementById('legendBar');
  const legendTotal = document.getElementById('legendTotal');
  const legendWrong = document.getElementById('legendWrong');
  const mainArea = document.getElementById('mainArea');

  const btnCamera = document.getElementById('btnCamera');
  const btnDemo = document.getElementById('btnDemo');
  const btnReset = document.getElementById('btnReset');
  const cameraInput = document.getElementById('cameraInput');

  function showView(view) {
    welcomeView.style.display = 'none';
    photoView.classList.remove('active');
    scanView.classList.remove('active');
    legendBar.classList.remove('active');

    if (view === 'welcome') welcomeView.style.display = '';
    if (view === 'photo') photoView.classList.add('active');
    if (view === 'scanning') {
      photoView.classList.add('active');
      scanView.classList.add('active');
    }
  }

  function clearMarkers() {
    photoContainer.querySelectorAll('.marker').forEach(m => m.remove());
  }

  function addMarkers(graded, markerPositions) {
    clearMarkers();

    const wrongCount = graded.filter(r => !r.isCorrect).length;
    legendTotal.textContent = `${graded.length}問中`;
    if (wrongCount === 0) {
      legendWrong.textContent = '全問正解!';
      legendWrong.style.color = 'var(--green)';
    } else {
      legendWrong.textContent = `${wrongCount}問まちがい`;
      legendWrong.style.color = 'var(--red)';
    }
    legendBar.classList.add('active');

    graded.forEach((r, i) => {
      const pos = markerPositions[i];
      if (!pos) return;

      const marker = document.createElement('div');
      marker.className = `marker ${r.isCorrect ? 'marker-correct' : 'marker-wrong'}`;
      marker.style.left = pos.x + '%';
      marker.style.top = pos.y + '%';
      marker.style.animationDelay = (i * 0.08) + 's';

      let inner = `<div class="marker-circle">${r.isCorrect ? '' : '✗'}</div>`;
      if (!r.isCorrect) {
        inner += `<div class="correction-badge">${r.correctAnswer}</div>`;
      }
      marker.innerHTML = inner;

      photoContainer.appendChild(marker);
    });
  }

  // Demo mode with generated worksheet
  async function runDemo() {
    const containerW = mainArea.clientWidth;

    // Generate worksheet
    const data = await OcrModule.analyzeWorksheetImage(null);
    const graded = Solver.gradeProblems(data.problems);
    const sheet = WorksheetGen.draw(data.problems, containerW);

    // Show worksheet image
    photoContainer.innerHTML = '';
    photoContainer.appendChild(sheet.canvas);
    showView('scanning');

    // After scan animation, show markers
    setTimeout(() => {
      scanView.classList.remove('active');
      addMarkers(graded, sheet.markerPositions);
    }, 1500);
  }

  // Hardcoded marker positions for camera mode (% of image)
  const cameraMarkerPositions = [
    { x: 38, y: 26 },  // problem 9
    { x: 38, y: 40 },  // problem 10
    { x: 38, y: 54 },  // problem 11
    { x: 38, y: 68 },  // problem 12
    { x: 85, y: 26 },  // problem 13
    { x: 85, y: 40 },  // problem 14
    { x: 85, y: 54 },  // problem 15
    { x: 85, y: 68 },  // problem 16
  ];

  // Camera mode — getUserMedia (no iOS confirm dialog)
  let currentStream = null;
  const cameraView = document.getElementById('cameraView');
  const cameraVideo = document.getElementById('cameraVideo');

  async function openCamera() {
    try {
      currentStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      cameraVideo.srcObject = currentStream;
      cameraView.style.display = 'flex';
    } catch (err) {
      alert('カメラを開けませんでした。カメラの許可を確認してください。');
    }
  }

  function closeCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    cameraVideo.srcObject = null;
    cameraView.style.display = 'none';
  }

  async function capturePhoto() {
    // Capture frame from video to canvas
    const canvas = document.createElement('canvas');
    canvas.width = cameraVideo.videoWidth;
    canvas.height = cameraVideo.videoHeight;
    canvas.getContext('2d').drawImage(cameraVideo, 0, 0);

    // Close camera immediately — no confirmation needed
    closeCamera();

    // Show captured photo
    photoContainer.innerHTML = '';
    const img = document.createElement('img');
    img.src = canvas.toDataURL('image/jpeg', 0.9);
    img.alt = 'ドリル写真';
    photoContainer.appendChild(img);
    showView('scanning');

    // Grade (stub: uses demo data)
    const data = await OcrModule.analyzeWorksheetImage(null);
    const graded = Solver.gradeProblems(data.problems);

    const go = () => setTimeout(() => {
      scanView.classList.remove('active');
      addMarkers(graded, cameraMarkerPositions);
    }, 1500);

    if (img.complete) { go(); } else { img.onload = go; }
  }

  // Expose to inline onclick
  window.App = { closeCamera, capturePhoto };

  // Reset
  function reset() {
    clearMarkers();
    photoContainer.innerHTML = '';
    legendBar.classList.remove('active');
    showView('welcome');
  }

  btnCamera.addEventListener('click', openCamera);
  btnDemo.addEventListener('click', runDemo);
  btnReset.addEventListener('click', reset);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
