<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ドリルチェッカー">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>ドリルチェッカー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #16a34a;
  --red: #dc2626;
  --blue: #2563eb;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-sub: #64748b;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  background: #000;
  color: var(--text);
  -webkit-text-size-adjust: 100%;
  height: 100dvh;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* Main area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}

.welcome {
  text-align: center;
  padding: 40px 20px;
}
.welcome h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.welcome p { font-size: 14px; color: var(--text-sub); line-height: 1.6; }

/* Photo view — scrollable, full width image */
.photo-view {
  display: none;
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: #000;
}
.photo-view.active { display: block; }

.photo-container {
  position: relative;
  width: 100%;
}
.photo-container img {
  display: block;
  width: 100%;
  height: auto;
}

/* Markers */
.marker {
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 2;
  animation: pop 0.25s ease-out both;
}
@keyframes pop {
  0% { transform: translate(-50%, -50%) scale(0); }
  70% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

.marker-maru {
  width: 22px;
  height: 22px;
  border: 3px solid var(--red);
  border-radius: 50%;
}

.marker-batsu {
  display: flex;
  align-items: center;
  gap: 4px;
}
.marker-batsu .x-mark {
  color: var(--blue);
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
}
.marker-batsu .correct-val {
  color: var(--blue);
  font-size: 16px;
  font-weight: 800;
  line-height: 1;
  text-shadow: 0 0 4px rgba(255,255,255,0.9);
}

/* Scan overlay */
.scan-overlay {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 5;
  background: rgba(0,0,0,0.5);
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.scan-overlay.active { display: flex; }
.scan-line {
  position: absolute;
  left: 5%; right: 5%;
  height: 3px;
  background: var(--blue);
  box-shadow: 0 0 12px rgba(37,99,235,0.6);
  animation: scanDown 1.2s ease-in-out infinite;
}
@keyframes scanDown {
  0%   { top: 5%; opacity: 1; }
  100% { top: 90%; opacity: 0.3; }
}
.scan-label {
  font-size: 16px;
  font-weight: 600;
  color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Summary bar */
.summary-bar {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 3;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 10px 16px;
  padding-top: calc(10px + env(safe-area-inset-top, 0px));
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  border-bottom: 1px solid #e2e8f0;
}
.summary-bar.active { display: block; }

/* Bottom bar */
.bottom-bar {
  flex-shrink: 0;
  background: var(--card);
  border-top: 1px solid #e2e8f0;
  display: flex;
  gap: 8px;
  padding: 10px 16px calc(10px + var(--safe-bottom));
  z-index: 10;
  justify-content: center;
}
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 48px;
  padding: 0 24px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, opacity 0.1s;
  flex: 1;
  max-width: 240px;
}
.btn:active { transform: scale(0.97); opacity: 0.9; }
.btn-primary { background: var(--blue); color: white; }
</style>
</head>
<body>

<main class="main" id="mainArea">
  <div class="welcome" id="welcomeView">
    <h2>ドリルをチェックしよう</h2>
    <p>カメラでドリルを撮影すると<br>自動でまるつけします</p>
  </div>

  <div class="photo-view" id="photoView">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="photo-container" id="photoContainer"></div>
  </div>

  <div class="scan-overlay" id="scanView">
    <div class="scan-line"></div>
    <span class="scan-label">チェック中...</span>
  </div>
</main>

<nav class="bottom-bar">
  <button class="btn btn-primary" id="btnCamera">📷 カメラ</button>
  <button class="btn btn-primary" id="btnRetry" style="display:none;">↩ もういちど</button>
</nav>

<!-- Camera -->
<div id="cameraView" style="display:none;position:fixed;inset:0;z-index:100;background:#000;flex-direction:column;align-items:center;justify-content:center;">
  <video id="cameraVideo" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
  <div style="position:absolute;bottom:0;left:0;right:0;height:160px;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;gap:32px;">
    <button id="btnCameraClose" style="background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.6);color:white;border-radius:50%;width:60px;height:60px;font-size:24px;cursor:pointer;touch-action:manipulation;">✕</button>
    <button id="btnShutter" style="background:white;border:6px solid rgba(255,255,255,0.7);border-radius:50%;width:80px;height:80px;cursor:pointer;box-shadow:0 0 0 4px rgba(0,0,0,0.4);touch-action:manipulation;"></button>
  </div>
</div>

<script>
const Solver = (() => {
  const ops = {
    '+': (a, b) => a + b, '-': (a, b) => a - b,
    '×': (a, b) => a * b, '÷': (a, b) => Math.floor(a / b),
  };
  function grade(problems) {
    return problems.map(p => {
      const correct = ops[p.operator](p.operand1, p.operand2);
      return { ...p, correctAnswer: correct, isCorrect: p.studentAnswer === correct };
    });
  }
  return { grade };
})();

const App = (() => {
  const $ = id => document.getElementById(id);
  const welcomeView = $('welcomeView');
  const photoView = $('photoView');
  const photoContainer = $('photoContainer');
  const scanView = $('scanView');
  const summaryBar = $('summaryBar');
  const btnCamera = $('btnCamera');
  const btnRetry = $('btnRetry');

  function showButtons(mode) {
    btnCamera.style.display = mode === 'camera' ? '' : 'none';
    btnRetry.style.display = mode === 'retry' ? '' : 'none';
  }

  function showView(view) {
    welcomeView.style.display = 'none';
    photoView.classList.remove('active');
    scanView.classList.remove('active');
    summaryBar.classList.remove('active');
    if (view === 'welcome') welcomeView.style.display = '';
    if (view === 'photo') photoView.classList.add('active');
    if (view === 'scanning') {
      photoView.classList.add('active');
      scanView.classList.add('active');
    }
  }

  function addMarkers(graded, positions) {
    // Remove old markers
    photoContainer.querySelectorAll('.marker').forEach(m => m.remove());

    graded.forEach((r, i) => {
      const pos = positions[i];
      if (!pos) return;

      const marker = document.createElement('div');
      marker.className = 'marker';
      marker.style.left = pos.x + '%';
      marker.style.top = pos.y + '%';
      marker.style.animationDelay = (i * 0.06) + 's';

      if (r.isCorrect) {
        marker.innerHTML = '<div class="marker-maru"></div>';
      } else {
        marker.innerHTML = `<div class="marker-batsu"><span class="x-mark">✓</span><span class="correct-val">${r.correctAnswer}</span></div>`;
      }

      photoContainer.appendChild(marker);
    });

    // Summary
    const wrong = graded.filter(r => !r.isCorrect).length;
    if (wrong === 0) {
      summaryBar.innerHTML = `<span style="color:var(--green)">全問正解! (${graded.length}問)</span>`;
    } else {
      summaryBar.innerHTML = `<span>${graded.length}問中 </span><span style="color:var(--red)">${wrong}問まちがい</span>`;
    }
    summaryBar.classList.add('active');
  }

  // Camera
  let stream = null;
  const cameraView = $('cameraView');
  const video = $('cameraVideo');

  async function openCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      cameraView.style.display = 'flex';
    } catch { alert('カメラを開けませんでした'); }
  }

  function closeCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    cameraView.style.display = 'none';
  }

  async function capture() {
    try {
      // Calculate visible area: video is object-fit:cover, bottom 160px is masked
      const vw = video.videoWidth || 1080;
      const vh = video.videoHeight || 1920;
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      const maskH = 160;
      const visibleH = screenH - maskH;

      // object-fit: cover scaling
      const scale = Math.max(screenW / vw, screenH / vh);
      const dispW = vw * scale;
      const dispH = vh * scale;
      const offX = (dispW - screenW) / 2;
      const offY = (dispH - screenH) / 2;

      // Visible rect in video coordinates
      const sx = offX / scale;
      const sy = offY / scale;
      const sw = screenW / scale;
      const sh = visibleH / scale;

      const c = document.createElement('canvas');
      c.width = Math.round(sw);
      c.height = Math.round(sh);
      c.getContext('2d').drawImage(video, sx, sy, sw, sh, 0, 0, c.width, c.height);
      closeCamera();

      // Show photo
      photoContainer.innerHTML = '';
      const img = document.createElement('img');
      img.src = c.toDataURL('image/jpeg', 0.9);
      photoContainer.appendChild(img);
      showView('scanning');

      // Scale down for API
      const MAX = 800;
      let b64;
      if (c.width > MAX) {
        const rs = MAX / c.width;
        const sm = document.createElement('canvas');
        sm.width = MAX; sm.height = Math.round(c.height * rs);
        sm.getContext('2d').drawImage(c, 0, 0, sm.width, sm.height);
        b64 = sm.toDataURL('image/jpeg', 0.80);
      } else {
        b64 = c.toDataURL('image/jpeg', 0.80);
      }

      // API call
      let graded = null, positions = [], error = null;
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64: b64 })
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          error = [body.error, body.raw, body.parts].filter(Boolean).join('\n') || `API error ${res.status}`;
        } else {
          const { problems } = await res.json();
          if (problems && problems.length > 0) {
            graded = Solver.grade(problems.map(p => ({
              number: p.number, operand1: p.operand1,
              operator: p.operator || '-', operand2: p.operand2,
              studentAnswer: p.studentAnswer
            })));
            // Use Gemini positions
            const hasPos = problems.every(p => p.markerX != null && p.markerY != null);
            // Y correction: top of image needs more offset than bottom
            positions = hasPos
              ? problems.map(p => ({ x: p.markerX, y: p.markerY + 3 * (1 - p.markerY / 100) }))
              : fallbackPositions(graded.length);
          } else {
            error = '問題を読み取れませんでした';
          }
        }
      } catch (e) { error = e.message; }

      scanView.classList.remove('active');

      if (!graded) {
        alert(error || '読み取りに失敗しました。もう一度撮影してください。');
        reset();
        return;
      }

      addMarkers(graded, positions);
      showButtons('retry');

    } catch(e) { alert('エラー: ' + e.message); }
  }

  // Fallback: 2-column grid positions
  function fallbackPositions(n) {
    const rows = Math.ceil(n / 2);
    const pos = [];
    for (let i = 0; i < n; i++) {
      const col = i < rows ? 0 : 1;
      const row = i < rows ? i : i - rows;
      const x = col === 0 ? 38 : 78;
      const yStart = 22, yEnd = 82;
      const y = rows <= 1 ? 50 : yStart + (row / (rows - 1)) * (yEnd - yStart);
      pos.push({ x, y });
    }
    return pos;
  }

  function reset() {
    photoContainer.innerHTML = '';
    summaryBar.classList.remove('active');
    showView('welcome');
    showButtons('camera');
  }

  $('btnCameraClose').addEventListener('click', closeCamera);
  $('btnShutter').addEventListener('click', capture);
  btnCamera.addEventListener('click', openCamera);
  btnRetry.addEventListener('click', () => { reset(); openCamera(); });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
